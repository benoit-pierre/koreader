name: build matrix

on:
  workflow_call:
    inputs:
      fail-fast:
        default: true
        type: boolean
      matrix:
        required: true
        type: string

defaults:
  run:
    shell: bash --noprofile --norc -eo pipefail {0}

env:
  BASH_ENV: '/root/.bashrc'
  # Bump number to reset all caches.
  CACHE_EPOCH: '0'
  CLICOLOR_FORCE: '1'

jobs:

  build:

    strategy:
      fail-fast: ${{ inputs.fail-fast }}
      matrix: ${{ fromJSON(inputs.matrix) }}

    name: ${{ matrix.job }}
    runs-on: ${{ matrix.runs-on || 'ubuntu-latest' }}
    container: "${{ matrix.image && fromJSON(format('{ \"image\": {0}, \"options\": \"--user root\" }', matrix.image)) || '' }}"

    env:
      # Work around glib configure check for `msgfmt`
      # (which is not needed to build what we need).
      ac_cv_path_MSGFMT: '/usr/bin/false'
      # Disable `tar` configure "safety" check…
      FORCE_UNSAFE_CONFIGURE: 1
      MAKEFLAGS: 'OUTPUT_DIR=build INSTALL_DIR=install TARGET=${{ matrix.target }} ${{ matrix.makeflags }}'

    steps:

      # Checkout / fetch. {{{

      - name: Checkout
        uses: actions/checkout@v4
        with:
          clean: false
          fetch-depth: 0
          fetch-tags: true
          # filter: tree:0
          show-progress: false

      - name: Fix checkout ownership
        if: matrix.image
        run: chown 'root:root' .

      - name: Fetch
        run: make fetchthirdparty

      # }}}

      - name: Lint
        if: matrix.lint
        run: .ci/check.sh

      # Restore / setup caches. {{{

      - name: Generate cache key
        run: make -C base cache-key

      - name: Restore build directory
        id: build-restore
        uses: actions/cache/restore@v4
        with:
          path: base/build
          key: ${{ env.CACHE_EPOCH }}-${{ matrix.job }}-build-${{ hashFiles('base/cache-key') }}

      - name: Restore build cache
        id: ccache-restore
        if: steps.build-restore.outputs.cache-hit != 'true'
        uses: actions/cache/restore@v4
        with:
          path: /github/home/.ccache
          key: ${{ env.CACHE_EPOCH }}-${{ matrix.job }}-ccache-${{ hashFiles('base/cache-key') }}
          restore-keys: ${{ env.CACHE_EPOCH }}-${{ matrix.job }}-ccache-

      - name: Setup build cache
        if: steps.build-restore.outputs.cache-hit != 'true'
        run: |
          set -x
          ccache --zero-stats
          ccache --max-size=256M
          ccache --show-config

      # }}}

      # Build. {{{

      - name: Build
        if: steps.build-restore.outputs.cache-hit != 'true'
        run: make base

      - name: Dump build timings
        if: steps.build-restore.outputs.cache-hit != 'true'
        run: make buildstats

      - name: Dump binaries runtime path & dependencies
        run: make bindeps

      # }}}

      # Clean / save caches. {{{

      - name: Clean caches
        if: steps.build-restore.outputs.cache-hit != 'true' && always()
        run: |
          set -x
          # Trim the build directory.
          rm -rf base/build/{cmake,staging,thirdparty}
          ccache --cleanup >/dev/null
          ccache --show-stats

      - name: Save build cache
        uses: actions/cache/save@v4
        if: steps.build-restore.outputs.cache-hit != 'true' && steps.ccache-restore.outputs.cache-hit != 'true'
        with:
          path: /github/home/.ccache
          key: ${{ steps.ccache-restore.outputs.cache-primary-key }}

      - name: Save build directory
        uses: actions/cache/save@v4
        if: steps.build-restore.outputs.cache-hit != 'true'
        with:
          path: base/build
          key: ${{ steps.build-restore.outputs.cache-primary-key }}

      # }}}

      - name: Install
        run: make --assume-old=base all

      - name: Test
        if: matrix.test
        run: make --assume-old=all testfront

      # Generate / upload artifact. {{{

      - name: Setup gradle
        if: matrix.target == 'android'
        uses: gradle/actions/setup-gradle@v3
        with:
          cache-read-only: false
          generate-job-summary: ${{ runner.debug == '1' && 'true' || 'false' }}
          gradle-home-cache-cleanup: true
          gradle-version: '7.5'

      - name: Generate artifact
        if: matrix.artifact
        run: make --assume-old=all update

      - name: Sign artifact
        if: matrix.target == 'android'
        run: uber-apk-signer --overwrite --apks ${{ matrix.artifact }}

      - name: Upload artifact
        if: matrix.artifact
        uses: actions/upload-artifact@v4
        with:
          name: koreader-${{ matrix.job }}
          path: ${{ matrix.artifact }}

      # }}}

  # }}}

